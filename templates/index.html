<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HelloBird :: CCTV Recon</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="windows">

    <div class="window" style="width: 800px; margin: 50px auto;">
        <div class="title-bar">
            <div class="title-bar-text">HelloBird :: CCTV Reconnaissance</div>
            <div class="title-bar-controls">
                <button aria-label="Minimize"></button>
                <button aria-label="Maximize"></button>
                <button aria-label="Close"></button>
            </div>
        </div>
        <div class="window-body">
            <p>Enter a public IP address to scan for exposed cameras.</p>
            <div class="field-row-stacked" style="margin-top: 20px;">
                <label for="ipAddress">Target IP:</label>
                <input id="ipAddress" type="text" placeholder="e.g., 8.8.8.8" />
            </div>

            <section class="field-row" style="justify-content: flex-end; margin-top: 20px;">
                <button id="scanButton">Scan</button>
            </section>

            <div class="sunken-panel" id="output-container" style="margin-top: 20px; height: 300px; overflow-y: scroll; font-family: 'monaco', monospace; font-size: 12px; line-height: 1.2;">
                <p>Awaiting command...</p>
            </div>

            <div id="results-container" style="margin-top: 20px;">
                <div class="window" style="width: 100%;">
                    <div class="title-bar">
                        <div class="title-bar-text">Scan Results</div>
                    </div>
                    <div class="window-body">
                        <div id="device-info"></div>
                        <div id="vulnerabilities"></div>
                        <div id="streams"></div>
                        <div id="manual-recon"></div>
                    </div>
                </div>
            </div>

            <div id="video-container" style="margin-top: 10px; background-color: black; display: none;">
               <video id="video-player" style="width: 100%;" controls></video>
            </div>
        </div>
        <div class="status-bar">
            <p id="statusBar" class="status-bar-field">Ready</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const ipAddressInput = document.getElementById('ipAddress');
            const scanButton = document.getElementById('scanButton');
            const outputContainer = document.getElementById('output-container');
            const statusBar = document.getElementById('statusBar');
            const videoContainer = document.getElementById('video-container');
            const videoPlayer = document.getElementById('video-player');
            const deviceInfo = document.getElementById('device-info');
            const vulnerabilities = document.getElementById('vulnerabilities');
            const streams = document.getElementById('streams');
            const manualRecon = document.getElementById('manual-recon');
            let eventSource;
            let hls;

            scanButton.addEventListener('click', () => {
                const ip = ipAddressInput.value.trim();
                if (!ip) {
                    outputContainer.innerHTML = '<p style="color: red;">Error: IP address cannot be empty.</p>';
                    return;
                }

                if (eventSource) {
                    eventSource.close();
                }

                outputContainer.innerHTML = '';
                deviceInfo.innerHTML = '';
                vulnerabilities.innerHTML = '';
                streams.innerHTML = '';
                manualRecon.innerHTML = '';
                statusBar.textContent = `Scanning ${ip}...`;
                scanButton.disabled = true;

                eventSource = new EventSource('/scan', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ ip: ip }),
                });

                eventSource.onmessage = function(event) {
                    const content = event.data;

                    try {
                        const data = JSON.parse(content);

                        if (data.type === 'scan_log') {
                            const line = document.createElement('div');
                            line.textContent = data.message;
                            outputContainer.appendChild(line);
                        } else if (data.type === 'device_info') {
                            let html = '<h3>Device Information</h3>';
                            for (const key in data.message) {
                                html += `<p><strong>${key}:</strong> ${data.message[key]}</p>`;
                            }
                            deviceInfo.innerHTML = html;
                        } else if (data.type === 'vulnerabilities') {
                            let html = '<h3>Vulnerabilities</h3>';
                            data.message.forEach(cve => {
                                html += `<p><a href="https://nvd.nist.gov/vuln/detail/${cve}" target="_blank">${cve}</a></p>`;
                            });
                            vulnerabilities.innerHTML = html;
                        } else if (data.type === 'streams') {
                            let html = '<h3>Streams</h3>';
                            data.message.forEach(url => {
                                html += `<p><a href="#" class="stream-link" data-url="${url}">${url}</a></p>`;
                            });
                            streams.innerHTML = html;
                        } else if (data.type === 'manual_recon') {
                            let html = '<h3>Manual Recon</h3>';
                            for (const key in data.message) {
                                html += `<p><a href="${data.message[key]}" target="_blank">${key}</a></p>`;
                            }
                            manualRecon.innerHTML = html;
                        }
                    } catch (e) {
                        const line = document.createElement('div');
                        line.textContent = content;
                        outputContainer.appendChild(line);
                    }

                    outputContainer.scrollTop = outputContainer.scrollHeight;
                };

                eventSource.onerror = function() {
                    statusBar.textContent = 'Error: Connection to server lost or scan complete.';
                    scanButton.disabled = false;
                    eventSource.close();
                };
            });

            document.body.addEventListener('click', (e) => {
                if (e.target.classList.contains('stream-link')) {
                    e.preventDefault();
                    const streamUrl = e.target.getAttribute('data-url');
                    statusBar.textContent = `Loading stream: ${streamUrl}`;
                    videoContainer.style.display = 'block';

                    if (hls) {
                        hls.destroy();
                    }
                    hls = new Hls();
                    const encodedUrl = btoa(streamUrl);
                    hls.loadSource(`/stream/${encodedUrl}`);
                    hls.attachMedia(videoPlayer);
                    hls.on(Hls.Events.MANIFEST_PARSED, function() {
                        videoPlayer.play();
                        statusBar.textContent = 'Stream is playing.';
                    });
                }
            });

            window.addEventListener('beforeunload', () => {
                if (eventSource) {
                    eventSource.close();
                }
            });
        });
    </script>
</body>
</html>
