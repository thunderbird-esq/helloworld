<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CamXploit Scanner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="window">
        <div class="title-bar">
            <span class="title">CamXploit Scanner</span>
        </div>
        <div class="window-body">
            <div class="form-group">
                <label for="ip">IP Address:</label>
                <input type="text" id="ip" placeholder="e.g. 192.168.1.1">
                <button id="scan">Scan</button>
            </div>
            <div id="output" class="output" tabindex="0"></div>
        </div>
    </div>
    <script>
    const button = document.getElementById('scan');
    const output = document.getElementById('output');

    function appendLine(text) {
        const div = document.createElement('div');
        div.textContent = text;
        output.appendChild(div);
        output.scrollTop = output.scrollHeight;
    }

    button.addEventListener('click', async () => {
        const ip = document.getElementById('ip').value.trim();
        if (!ip) return;
        button.disabled = true;
        output.innerHTML = '';

        try {
            const response = await fetch('/scan', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ ip })
            });
            if (!response.ok) {
                const data = await response.json().catch(() => ({}));
                appendLine(data.error || 'Server error');
                button.disabled = false;
                return;
            }

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';
            while (true) {
                const { value, done } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, { stream: true });
                let parts = buffer.split('\n\n');
                buffer = parts.pop();
                for (const part of parts) {
                    const line = part.trim();
                    if (line.startsWith('data:')) {
                        appendLine(line.slice(5).trim());
                    } else if (line.startsWith('event: end')) {
                        button.disabled = false;
                        return; // stop reading
                    }
                }
            }
        } catch (e) {
            appendLine('Failed to connect');
            button.disabled = false;
        }
    });
    </script>
</body>
</html>
