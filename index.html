<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CamXploit Scanner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="window">
        <div class="title-bar">
            <span class="title">CamXploit Scanner</span>
        </div>
        <div class="window-body">
            <div class="form-group">
                <label for="ip">IP Address:</label>
                <input type="text" id="ip" placeholder="e.g. 192.168.1.1">
                <button id="scan">Scan</button>
            </div>
            <div id="status" class="status"></div>
            <div id="results" class="output" tabindex="0"></div>
        </div>
    </div>
    <script>
    const button = document.getElementById('scan');
    const statusEl = document.getElementById('status');
    const results = document.getElementById('results');
    let es;

    function addFinding(event) {
        const div = document.createElement('div');
        if (event.url) {
            const b64 = btoa(event.url).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
            const anchor = document.createElement('a');
            anchor.href = '/stream/' + b64;
            anchor.textContent = event.url;
            anchor.target = '_blank';
            div.textContent = (event.message || '').replace(event.url, '');
            div.appendChild(anchor);
        } else {
            div.textContent = event.message || '';
        }
        results.appendChild(div);
        results.scrollTop = results.scrollHeight;
    }

    button.addEventListener('click', () => {
        const ip = document.getElementById('ip').value.trim();
        if (!ip) return;
        if (es) es.close();
        button.disabled = true;
        statusEl.textContent = '';
        results.innerHTML = '';

        es = new EventSource('/scan?ip=' + encodeURIComponent(ip));
        es.onmessage = (ev) => {
            if (!ev.data) return;
            let evt;
            try { evt = JSON.parse(ev.data); } catch { return; }
            if (evt.type === 'status') {
                statusEl.textContent = evt.message;
            } else if (evt.type === 'finding') {
                addFinding(evt);
            } else if (evt.type === 'end') {
                es.close();
                button.disabled = false;
            }
        };
        es.onerror = () => {
            if (es) es.close();
            button.disabled = false;
            statusEl.textContent = 'Connection error';
        };
    });
    </script>
</body>
</html>
